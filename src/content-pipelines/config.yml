# Content pipelines configuration
#
# Each entry defines a content pipeline that syncs docs from an external
# repository and uses the content-pipeline-update agent to update content articles.
#
# The update.ts script reads this file so you can run:
#   $ npx tsx src/content-pipelines/scripts/update.ts --id copilot-cli
#
# The workflow matrix in .github/workflows/content-pipelines.yml only needs `id`;
# everything else is read from this file.
#
# `exclusions` lists source topics the agent should skip during gap analysis.
# Use an empty list ([]) when nothing should be excluded. Example:
#   exclusions:
#     - Internal debugging commands
#     - Experimental telemetry flags
#
copilot-cli:
  name: Copilot CLI
  source-repo: github/copilot-agent-runtime
  source-path: docs/cli
  target-articles:
    - content/copilot/reference/copilot-cli-reference/cli-command-reference.md
    - content/copilot/reference/copilot-cli-reference/cli-plugin-reference.md
    - content/copilot/reference/copilot-cli-reference/acp-server.md
    - content/copilot/reference/copilot-cli-reference/cli-config-dir-reference.md
    - content/copilot/reference/hooks-reference.md
  exclusions:
    - All mentions of, or information directly relating to, feature flags
    - enabledFeatureFlags configuration setting
    - COPILOT_CLI_ENABLED_FEATURE_FLAGS environment variable
  content-mapping: |
    content/copilot/reference/copilot-cli-reference/cli-plugin-reference.md covers only plugin-specific content.
    All information relating to files in the ~/.copilot configuration directory, and settings in those files, should go in content/copilot/reference/copilot-cli-reference/cli-config-dir-reference.md.
    All reference details relating to hooks should go in content/copilot/reference/hooks-reference.md.
    All other CLI topics (MCP, skills, agents, permissions, etc.) belong in content/copilot/reference/copilot-cli-reference/cli-command-reference.md even when they mention plugins.

