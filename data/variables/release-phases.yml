# Contains variables to identify GitHub's release phases. These are aligned with Microsoft standards.
# For reference: https://github.com/github/docs-team/issues/4302

preview: 'preview'

public_preview: 'public preview'

public_preview_dpa: >-
  public preview with [data protection](https://gh.io/dpa)

public_preview_caps: 'Public preview'

private_preview: 'private preview'

private_preview_caps: 'Private preview'

technical_preview: >-
  technical preview

technical_preview_caps: >-
  Technical preview

closing_down: 'closing down'

closing_down_caps: 'Closing down'

retired: 'retired'

retired_caps: 'Retired'
