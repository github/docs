date: '2026-05-07'
sections:
  features:
    - |
      To prevent Redis replication failures in clusters with high write volumes, administrators can configure Redis replication backlog size and client output buffer limits via `ghe-config`. Previously, these settings used fixed defaults that could cause replica disconnections when write throughput exceeded buffer limits, resulting in continuous full-resync loops. Changes take effect after running a configuration run. 
  security_fixes:
    - |
      **HIGH**: An attacker could exploit a server-side request forgery (SSRF) vulnerability in the notebook viewer to access internal services by exploiting URL parser confusion between the validation layer and the HTTP request library. This attack required network access to the GHES instance with private mode disabled. The vulnerability was addressed by aligning URL parsing between the validation and request layers and adding explicit validation of URL scheme, port, and userinfo components. GitHub has requested CVE ID [CVE-2026-8034](https://www.cve.org/cverecord?id=CVE-2026-8034) for this vulnerability, which was reported via the [GitHub Bug Bounty program](https://bounty.github.com). 
    - |
      **MEDIUM**: An attacker could cause a denial of service on the instance by sending crafted requests with deeply nested JSON payloads to an unauthenticated API endpoint. To mitigate this issue, GitHub has added maximum size and depth validation to the stats endpoint. GitHub has requested CVE ID [CVE-2026-7541](https://www.cve.org/cverecord?id=CVE-2026-7541) for this vulnerability, which was reported via the [GitHub Bug Bounty](https://bounty.github.com/) program.
    - |
      **MEDIUM**: An attacker could create a local user account on a GitHub Enterprise Server instance configured with an external authentication provider, bypassing the identity provider entirely. The signup endpoint did not properly enforce the external authentication restriction, allowing account creation and session establishment without identity provider validation. The created account was limited to the default base permissions configured on the instance. GitHub has requested CVE ID [CVE-2026-6736](https://www.cve.org/cverecord?id=CVE-2026-6736) for this vulnerability.
  bugs:
    - |
      Administrators who cancelled `ghe-live-migrations` (Ctrl+C or SIGTERM) during a live upgrade found that the CLI exited but the live-upgrade container continued running in the background. The container now stops gracefully when the command is interrupted. 
    - |
      On instances with high push activity, commits did not appear in pull requests for minutes to hours, webhooks were delayed, and pull request state appeared stale. The stream processor service ran as a single process per node and could not scale horizontally to handle message volume. 
    - |
      When initially configuring GitHub Actions with OIDC authentication, the configuration failed with an error indicating that OIDC was not enabled. 
    - |
      The metrics page for secret scanning and push protection on security overview failed to load with an encoding error when pagination cursors contained binary data that could not be converted from UTF-8 to ASCII. 
    - |
      On the secret scanning alert page for a generic secret, a feedback banner linked to a survey that no longer exists. 
  changes:
    - |
      The `ghe-cluster-hotpatch` command supports the `--parallel` flag. This flag executes the rollover stage in parallel across all nodes in a cluster, saving a significant amount of time during upgrades of large clusters. 
    - |
      To prevent collectd memory exhaustion and OOM kills caused by write queue growth, administrators can configure collectd write queue limits and memory caps via `ghe-config`. Previously, tuning these settings required manual edits to collectd.conf and systemd configuration files. Changes take effect after running a configuration apply. 
    - |
      When a user exports repositories using the migrations REST API, tarballs are staged in the data volume before being uploaded to blob storage. This location provides more disk capacity than the root volume, which was the previous staging location. 
  known_issues:
    - |
      During an upgrade of GitHub Enterprise Server, custom firewall rules are removed. If you use custom firewall rules, you must reapply them after upgrading.
    - |
      During the validation phase of a configuration run, a `No such object` error may occur for the Notebook and Viewscreen services. This error can be ignored as the services should still correctly start.
    - |
      If the root site administrator is locked out of the Management Console after failed login attempts, the account does not unlock automatically after the defined lockout time. Someone with administrative SSH access to the instance must unlock the account using the administrative shell. See [AUTOTITLE](/admin/administering-your-instance/administering-your-instance-from-the-web-ui/troubleshooting-access-to-the-management-console#unlocking-the-root-site-administrator-account).
    - |
      On an instance with the HTTP `X-Forwarded-For` header configured for use behind a load balancer, all client IP addresses in the instance's audit log erroneously appear as 127.0.0.1.
    - |
      {% data reusables.release-notes.large-adoc-files-issue %}
    - |
      Admin stats REST API endpoints may timeout on appliances with many users or repositories. Retrying the request until data is returned is advised.
    - |
      When following the steps for [Replacing the primary MySQL node](/admin/monitoring-managing-and-updating-your-instance/configuring-clustering/replacing-a-cluster-node#replacing-the-primary-mysql-node), step 14 (running `ghe-cluster-config-apply`) might fail with errors. If this occurs, re-running `ghe-cluster-config-apply` is expected to succeed.
    - |
      Running a config apply as part of the steps for [Replacing a node in an emergency](/admin/monitoring-managing-and-updating-your-instance/configuring-clustering/replacing-a-cluster-node#replacing-a-node-in-an-emergency) may fail with errors if the node being replaced is still reachable. If this occurs, shutdown the node and repeat the steps.
    - |
      {% data reusables.release-notes.2024-06-possible-frontend-5-minute-outage-during-hotpatch-upgrade %}
    - |
      When restoring data originally backed up from a 3.13 or greater appliance version, the Elasticsearch indices need to be reindexed before some of the data will show up. This happens via a nightly scheduled job.  It can also be forced by running `/usr/local/share/enterprise/ghe-es-search-repair`.
    - |
      An organization-level code scanning configuration page is displayed on instances that do not use GitHub Advanced Security or code scanning.
    - |
      When enabling automatic update checks for the first time in the Management Console, the status is not dynamically reflected until the "Updates" page is reloaded.
    - |
      When restoring from a backup snapshot, a large number of `mapper_parsing_exception` errors may be displayed.
    - |
      When initializing a new GHES cluster, nodes with the `consul-server` role should be added to the cluster before adding additional nodes. Adding all nodes simultaneously creates a race condition between nomad server registration and nomad client registration.
    - |
      Admins setting up cluster high availability (HA) may encounter a spokes error when running `ghe-cluster-repl-status` if a new organization and repositories are created before using the `ghe-cluster-repl-bootstrap` command. To avoid this issue, complete the cluster HA setup with `ghe-cluster-repl-bootstrap` before creating new organizations and repositories.
    - |
      In a cluster, the host running restore requires access the storage nodes via their private IPs.
    - |
      On an instance hosted on Azure, commenting on an issue via email means the comment is not added to the issue.
    - |
      After a restore, existing outside collaborators cannot be added to repositories in a new organization. This issue can be resolved by running `/usr/local/share/enterprise/ghe-es-search-repair` on the appliance.
    - |
      After a geo-replica is promoted to be a primary by running `ghe-repl-promote`, the actions workflow of a repository does not have any suggested workflows.
    - |
      Unexpected elements may appear in the UI on the repo overview page for locked repositories.
    - |
      Audit log entries for pre-receive hooks that have been rejected may not be recorded.
    - |
      When applying an enterprise security configuration to all repositories (for example, enabling secret scanning or code scanning across all repositories), the system immediately enqueues enablement jobs for every organization in the enterprise simultaneously. For enterprises with a large number of repositories, this can result in significant system load and potential performance degradation. If you manage a large enterprise with many organizations and repositories, we recommend applying security configurations at the organization level rather than at the enterprise level in the UI. This allows you to enable security features incrementally and monitor system performance as you roll out changes.
    - |
      GitHub Enterprise Server releases shipped with mismatched Git versions between containers.
